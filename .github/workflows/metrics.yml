name: Metrics

on:
  # Refresh the metrics SVG four times a day
  schedule:
    - cron: "0 */6 * * *"
  # Allow manual runs from the Actions tab (use this for the first run)
  workflow_dispatch:
  # Regenerate when this workflow changes
  push:
    branches: [main]
    paths: [.github/workflows/metrics.yml]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # A classic PAT stored as the METRICS_TOKEN repo secret.
          # Scopes: repo, read:user  (add read:org if you want private-org data)
          token: ${{ secrets.METRICS_TOKEN }}
          user: NavpreetSSidhu
          filename: github-metrics.svg
          template: classic

          # Arcade palette to match the README
          config_timezone: Asia/Kolkata
          base: header, activity, community, repositories, metadata

          # Language breakdown
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_colors: 22D3EE, FF2E88, A855F7, FFD700, 06B6D4, 339933, 00ADD8, E0234E

          # Coding habits / activity heatmap
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Isometric contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
