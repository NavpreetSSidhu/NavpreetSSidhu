<svg xmlns="http://www.w3.org/2000/svg" width="900" height="18" viewBox="0 0 900 18" role="presentation">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#120458"/>
      <stop offset="0.18" stop-color="#22D3EE"/>
      <stop offset="0.45" stop-color="#A855F7"/>
      <stop offset="0.72" stop-color="#FF2E88"/>
      <stop offset="0.9"  stop-color="#FFD700"/>
      <stop offset="1"    stop-color="#120458"/>
    </linearGradient>
    <filter id="glow" x="-2%" y="-200%" width="104%" height="500%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="7" width="900" height="4" rx="2" fill="url(#neon)" filter="url(#glow)"/>
</svg>
